name: Pack & Publish NuGet Packages

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish packages to nuget.org
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
  PACKAGE_OUTPUT_DIR: artifacts/nuget

jobs:
  pack-and-publish:
    if: github.actor == 'ronakshethia'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # 🔢 Auto version generation (incremental)
      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $baseVersion = "1.0.0"
          $runNumber = "${{ github.run_number }}"
          $version = "$baseVersion.$runNumber"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Generated version: $version"

      - name: Restore
        run: dotnet restore .\LeakDetectorSuite.sln

      - name: Build
        run: dotnet build .\LeakDetectorSuite.sln -c Release --no-restore

      - name: Prepare output directory
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force $env:PACKAGE_OUTPUT_DIR -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $env:PACKAGE_OUTPUT_DIR | Out-Null

      # 📦 Pack (safe set — excluding MAUI for stability)
      - name: Pack projects
        shell: pwsh
        run: |
          $projects = @(
            '.\src\LeakDetectorSuite.Memory\LeakDetectorSuite.Memory.csproj',
            '.\src\LeakDetectorSuite.Performance\LeakDetectorSuite.Performance.csproj',
            '.\src\LeakDetectorSuite.Threading\LeakDetectorSuite.Threading.csproj'
          )

          foreach ($project in $projects) {
            dotnet pack $project `
              -c Release `
              --no-build `
              --output $env:PACKAGE_OUTPUT_DIR `
              -p:PackageVersion=${{ steps.version.outputs.version }} `
              -p:ContinuousIntegrationBuild=true
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            artifacts/nuget/*.nupkg
            artifacts/nuget/*.snupkg

      # 🚀 Publish ONLY if explicitly requested + only you
      - name: Publish to NuGet
        if: ${{ inputs.publish == true && github.actor == 'ronakshethia' }}
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw "NUGET_API_KEY is not configured"
          }

          Get-ChildItem $env:PACKAGE_OUTPUT_DIR -Filter *.nupkg |
            Where-Object { $_.Name -notlike '*.symbols.nupkg' } |
            ForEach-Object {
              dotnet nuget push $_.FullName `
                --api-key $env:NUGET_API_KEY `
                --source $env:NUGET_SOURCE `
                --skip-duplicate
            }

          Get-ChildItem $env:PACKAGE_OUTPUT_DIR -Filter *.snupkg |
            ForEach-Object {
              dotnet nuget push $_.FullName `
                --api-key $env:NUGET_API_KEY `
                --source $env:NUGET_SOURCE `
                --skip-duplicate
            }
